user  nginx;
worker_processes  1;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events { 
    worker_connections  1024;
}

http {
    include mime.types;
    server {
        listen 80;
        listen [::]:80;
        listen 443 ssl;
        server_name cctv.itmoscow;

        if ($scheme != "https")
        {
            return 301 https://$host$request_uri;
        }

        ssl_certificate /etc/nginx/ssl/cctv.itmoscow.crt;
        ssl_certificate_key /etc/nginx/ssl/cctv.itmoscow.key;

         # Modern SSL settings
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # Increase client max body size if needed for larger payloads
        client_max_body_size 50m;
        
        # OCSP Stapling
        # ssl_stapling on;
        # ssl_stapling_verify on;

        location / {
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Real-IP $remote_addr;
            # proxy_set_header Upgrade $http_upgrade;
            # proxy_redirect off;
            # proxy_buffering off;
            proxy_pass http://cctv_backend:8000;
        }
    }
    server {
        listen 80;
        listen [::]:80;
        listen 443 ssl;
        server_name media.cctv.itmoscow;

        if ($scheme != "https")
        {
            return 301 https://$host$request_uri;
        }

        ssl_certificate /etc/nginx/ssl/cctv.itmoscow.crt;
        ssl_certificate_key /etc/nginx/ssl/cctv.itmoscow.key;

        # Recommended SSL settings
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        
        # Increase client max body size if needed for larger payloads
        client_max_body_size 500m;

        set $cors "";
        if ($http_origin ~* (https?://(www\.)?cctv\.itmoscow|https?://media\.cctv\.itmoscow)) {
            set $cors "true";
        }
         # Modern SSL settings
        # ssl_protocols TLSv1.2 TLSv1.3;
        # ssl_prefer_server_ciphers on;
        # ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
        # ssl_session_cache shared:SSL:10m;
        # ssl_session_timeout 1d;
        # ssl_session_tickets off;
        
        # # OCSP Stapling
        # ssl_stapling on;
        # ssl_stapling_verify on;

        location / {
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket support (for WebRTC)
            # proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_read_timeout  86400;
            proxy_send_timeout  86400;
            
            # Для WebSocket (используется в WebRTC)
            proxy_set_header Sec-WebSocket-Key $http_sec_websocket_key;
            proxy_set_header Sec-WebSocket-Version $http_sec_websocket_version;
            proxy_set_header Sec-WebSocket-Extensions $http_sec_websocket_extensions;

            proxy_hide_header 'Access-Control-Allow-Origin';
            # CORS headers - add these to the response
            # Allows requests from any origin. For more security, replace '*' with your frontend domain (e.g., https://myfrontend.com)
            

            # Handle OPTIONS preflight requests for CORS
            if ($request_method = 'OPTIONS') {
                
                add_header 'Access-Control-Allow-Origin' "$http_origin" always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PATCH, DELETE' always;
                add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,If-Match';
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Length' 0;
                return 204;
                
            }

            if ($cors = "true") {
                add_header 'Access-Control-Allow-Origin' "$http_origin" always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PATCH, DELETE' always; # MediaMTX uses PATCH/DELETE for WHEP/WHIP
                add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization';
                add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range';
            }

            proxy_pass http://media-service:8889;
        }
    }
}
