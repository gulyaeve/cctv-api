services:
  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    ports:
      - "9080:9080"
    depends_on:
      - backend
      - media
    volumes:
      # - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./promtail-config.yaml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    privileged: true

  nginx:
    image:
      nginx:1.28-alpine
    container_name: cctv_nginx
    ports:
      - 80:80
      - 443:443
      - 5672:5672
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./cctv.itmoscow.key:/etc/nginx/ssl/cctv.itmoscow.key
      - ./cctv.itmoscow.crt:/etc/nginx/ssl/cctv.itmoscow.crt
    restart: always
    depends_on:
      - backend
      - rabbitmq
      - media
    networks:
      - default

  db:
    image: postgres:15
    container_name: cctv_db
    volumes:
      - postgresdata:/var/lib/postgresql/data
    env_file:
      - .env
    networks:
      - default
    restart: always
    # ports:
    #   - 5432:5432

  rabbitmq:
    # image: rabbitmq:4-management-alpine
    image: rabbitmq:4-alpine
    container_name: 'rabbitmq'
    hostname: 'rabbitmq'
    env_file:
      - .env
    restart: always
    networks:
      - default
    # ports:
        # - 5672:5672
        # - 15672:15672
    volumes:
        - rabbitmq_data:/var/lib/rabbitmq/
        - rabbitmq_log:/var/log/rabbitmq

  redis:
    image: redis:7
    container_name: redis
    restart: always
    networks:
      - default

  backend:
    image: cctv_backend
    build:
      context: .
      # dockerfile: Dockerfile-prod
    volumes:
      # - /home/user/screenshots:/src/app/static/screenshots
      - /home/user/screenshots:/src/screenshots_bank
    container_name: cctv_backend
    env_file:
      - .env
    depends_on:
      - db
      - rabbitmq
      - redis
      - media
    command: ["/src/docker/entry_point.sh"]
    restart: always
    ports:
      - 10.0.2.3:8000:8000
    networks:
      - default

# TODO: Check .env
  media:
    image: cctv_media
    build:
      context: .
      dockerfile: Dockerfile-media
    container_name: cctv_media
    env_file:
      - .env.media
    depends_on:
      - db
    volumes:
      - ./media/mediamtx.yml:/src/mediamtx.yml
      - ./media/ffmpeg_stream.py:/src/ffmpeg_stream.py
      - ./media/config.py:/src/config.py
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      # - ./cctv.itmoscow.key:/ssl/cctv.itmoscow.key
      # - ./cctv.itmoscow.crt:/ssl/cctv.itmoscow.crt
    networks:
      - default
    ports:
    #   - 8554:8554
    #   - 1935:1935
    #   - 8888:8888
    #   - 8890:8890/udp
      - 8189:8189/udp
      - 8889:8889
      - 9998:9998

  cctv_scr_worker:
    image: cctv_scr_worker
    volumes:
      - /home/user/screenshots:/screenshots
    container_name: cctv_scr_worker
    env_file:
      - .env.scr
    depends_on:
      - rabbitmq
    command: ["python", "main.py"]
    networks:
      - default

  cctv_max_worker:
    image: cctv_max_worker
    volumes:
      - /home/user/screenshots:/screenshots
    container_name: cctv_max_worker
    env_file:
      - .env.max
    depends_on:
      - rabbitmq
    command: ["python", "main.py"]
    networks:
      default

  # cctv_tg_worker:
  #   image: cctv_tg_worker
  #   # build:
  #   #   context: .
  #   volumes:
  #     - /home/user/screenshots:/screenshots
  #   container_name: cctv_tg_worker
  #   env_file:
  #     - .env.tg
  #   depends_on:
  #     - rabbitmq
  #   command: ["python", "main.py"]
  #   restart: always
  #   # ports:
  #   #   - 8000:8000
  #   networks:
  #      - default


volumes:
  postgresdata:
  rabbitmq_data:
  rabbitmq_log:

networks:
  default:
    name: cctv_network
    driver: bridge