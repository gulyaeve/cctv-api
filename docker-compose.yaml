services:
  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    ports:
      - "9080:9080"
    volumes:
      # - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./promtail-config.yaml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    privileged: true

  nginx:
    image:
      nginx:1.28-alpine
    container_name: cctv_nginx
    ports:
      - 80:80
      - 443:443
      - 5672:5672
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./cctv.itmoscow.key:/etc/nginx/ssl/cctv.itmoscow.key
      - ./cctv.itmoscow.crt:/etc/nginx/ssl/cctv.itmoscow.crt
    restart: always
    depends_on:
      - backend
      - db
    networks:
      - default

  db:
    image: postgres:15
    container_name: cctv_db
    volumes:
      - postgresdata:/var/lib/postgresql/data
    env_file:
      - .env
    networks:
      - default
    restart: always
    # ports:
    #   - 5432:5432

  rabbitmq:
    # image: rabbitmq:4-management-alpine
    image: rabbitmq:4-alpine
    container_name: 'rabbitmq'
    hostname: 'rabbitmq'
    env_file:
      - .env
    restart: always
    # ports:
        # - 5672:5672
        # - 15672:15672
    volumes:
        - rabbitmq_data:/var/lib/rabbitmq/
        - rabbitmq_log:/var/log/rabbitmq

  # redis:
  #   image: redis:7
  #   container_name: redis

  backend:
    image: cctv_backend
    build:
      context: .
      # dockerfile: Dockerfile-prod
    volumes:
      - /home/user/screenshots:/src/app/static/screenshots
    container_name: cctv_backend
    env_file:
      - .env
    depends_on:
      - db
      - rabbitmq
      # - redis
    command: ["/src/docker/entry_point.sh"]
    restart: always
    # ports:
    #   - 8000:8000
    networks:
      - default

  cctv_tg_worker:
    image: cctv_tg_worker
    # build:
    #   context: .
    volumes:
      - /home/user/screenshots:/screenshots
    container_name: cctv_tg_worker
    env_file:
      - .env.tg
    depends_on:
      - rabbitmq
    command: ["python", "main.py"]
    restart: always
    # ports:
    #   - 8000:8000
    networks:
       - default


volumes:
  postgresdata:
  rabbitmq_data:
  rabbitmq_log:

networks:
  default:
    name: cctv_network
    driver: bridge