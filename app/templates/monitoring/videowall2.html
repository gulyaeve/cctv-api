<script>
    function getCookie(name) {
        const cookieValue = document.cookie
            .split("; ")
            .find((row) => row.startsWith(`${name}=`))
            ?.split("=")[1]; // The optional chaining operator (?) is used here

        return cookieValue || null;
    }
    const access_token = getCookie("jwt_access_token");
</script>

<script>
  // Данные передаются из FastAPI через Jinja2
  const allCameras = {{ cameras | tojson }};
</script>
<script>
  // ─── Глобальное хранилище активных сессий ───────────────────────
  let activeSessions = []; // [{ pc, sessionUrl, videoEl }]
  let rotationTimer = null;
  let currentPage = 0;

  // ─── Остановить все текущие WebRTC-сессии ───────────────────────
  async function stopAllSessions() {
    const closing = activeSessions.map(async ({ pc, sessionUrl, videoEl }) => {
      // 1. Сброс видеоэлемента
      if (videoEl) {
        videoEl.srcObject = null;
      }
      // 2. Закрыть серверную сессию на MediaMTX (DELETE по WHEP)
      if (sessionUrl) {
        try {
          await fetch(sessionUrl, { method: 'DELETE' });
        } catch (e) {
          console.warn('[WHEP] Не удалось закрыть сессию на сервере:', e);
        }
      }
      // 3. Закрыть PeerConnection на стороне браузера
      if (pc && pc.signalingState !== 'closed') {
        pc.close();
      }
    });
    await Promise.allSettled(closing);
    activeSessions = [];
  }

  // ─── Запустить одну WHEP-сессию для видеоэлемента ───────────────
  async function startStream(videoEl, whepUrl) {
    const pc = new RTCPeerConnection();
    let sessionUrl = null;

    pc.addTransceiver('video', { direction: 'recvonly' });
    pc.addTransceiver('audio', { direction: 'recvonly' });

    pc.ontrack = (evt) => {
      if (evt.track.kind === 'video') {
        videoEl.srcObject = evt.streams[0];
      }
    };

    // Создаём offer
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);

    // Ждём завершения сбора ICE-кандидатов
    await new Promise((resolve) => {
      if (pc.iceGatheringState === 'complete') return resolve();
      pc.addEventListener('icegatheringstatechange', () => {
        if (pc.iceGatheringState === 'complete') resolve();
      });
    });

    // POST offer → MediaMTX WHEP endpoint
    const resp = await fetch(whepUrl, {
      method: 'POST',
      token: access_token,
      headers: { 'Content-Type': 'application/sdp' },
      body: pc.localDescription.sdp,
    });

    if (!resp.ok) {
      pc.close();
      throw new Error(`[WHEP] Ошибка ${resp.status} для ${whepUrl}`);
    }

    // Сохраняем URL сессии для последующего DELETE
    sessionUrl = resp.headers.get('location');
    const answerSdp = await resp.text();
    await pc.setRemoteDescription({ type: 'answer', sdp: answerSdp });

    // Регистрируем сессию
    activeSessions.push({ pc, sessionUrl, videoEl });
  }

  // ─── Загрузить один «экран» из 9 камер ──────────────────────────
  async function loadPage(pageIndex) {
    // 1. Останавливаем всё текущее
    await stopAllSessions();

    const videos = document.querySelectorAll('.camera-slot video');
    const start = pageIndex * 9;
    const cameras = allCameras.slice(start, start + 9); // allCameras — из шаблона Jinja

    // 2. Сбрасываем все слоты
    videos.forEach((v, i) => {
      v.srcObject = null;
      v.closest('.camera-slot').style.visibility =
        i < cameras.length ? 'visible' : 'hidden';
    });

    // 3. Параллельно запускаем новые сессии
    cameras.forEach((cam, i) => {
      startStream(videos[i], cam.whep_url)
        .catch((err) => console.error(`[WHEP] Камера "${cam.name}":`, err));
    });
  }

  // ─── Запустить цикл ротации ──────────────────────────────────────
  async function startRotation() {
    const totalPages = Math.ceil(allCameras.length / 9);
    if (totalPages === 0) return;

    await loadPage(currentPage);
    currentPage = (currentPage + 1) % totalPages;

    rotationTimer = setInterval(async () => {
      await loadPage(currentPage);
      currentPage = (currentPage + 1) % totalPages;
    }, 20000);
  }

  // ─── Очистка при уходе со страницы (закрытие вкладки) ───────────
  window.addEventListener('beforeunload', () => {
    stopAllSessions();
    if (rotationTimer) clearInterval(rotationTimer);
  });

  // ─── Старт ──────────────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', startRotation);
</script>
