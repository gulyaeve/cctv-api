    function getCookie(name) {
        const cookieValue = document.cookie
            .split("; ")
            .find((row) => row.startsWith(`${name}=`))
            ?.split("=")[1]; // The optional chaining operator (?) is used here

        return cookieValue || null;
    }
    const access_token = getCookie("jwt_access_token");

<script>
  const ALL_CAMERAS = {{ cameras | tojson }};
  const PAGE_SIZE   = 9;
  const ROTATE_MS   = 20000;
  // Токен пользователя из FastAPI сессии
  const MTX_TOKEN   = access_token;
</script>

<script>
(function () {
  'use strict';

  // ── Состояние (не зависит от DOM — можно снаружи) ────────────────
  let activeSessions = [];
  let rotationTimer  = null;
  let progressTimer  = null;
  let currentPage    = 0;

  // ── DOM-узлы объявляем здесь, инициализируем внутри DOMContentLoaded
  let slots, statusBadge, pageInfo, rotBar;

  // ── Утилиты ──────────────────────────────────────────────────────
  function getSlotVideo(slot)   { return slot.querySelector('.camera-feed'); }
  function getSlotLabel(slot)   { return slot.querySelector('.camera-label'); }
  function getSlotSpinner(slot) { return slot.querySelector('.camera-spinner'); }

  function setStatus(text, color = 'secondary') {
    if (!statusBadge) return; // ← защита на случай гонки
    statusBadge.textContent = text;
    statusBadge.className = `badge bg-${color}`;
  }

  // ── AUTH: добавить ?token= к URL ─────────────────────────────────
  function withToken(url) {
    if (!MTX_TOKEN) return url;
    try {
      const u = new URL(url);
      u.searchParams.set('token', MTX_TOKEN);
      return u.toString();
    } catch (e) {
      const sep = url.includes('?') ? '&' : '?';
      return `${url}${sep}token=${encodeURIComponent(MTX_TOKEN)}`;
    }
  }

  // ── Прогресс-бар ─────────────────────────────────────────────────
  function startProgressBar() {
    clearInterval(progressTimer);
    rotBar.style.width = '0%';
    const step = 100 / (ROTATE_MS / 100);
    let pct = 0;
    progressTimer = setInterval(() => {
      pct = Math.min(pct + step, 100);
      rotBar.style.width = pct + '%';
    }, 100);
  }

  // ── Закрыть все текущие WebRTC-сессии ────────────────────────────
  async function stopAllSessions() {
    const tasks = activeSessions.map(async ({ pc, sessionUrl, videoEl }) => {
      if (videoEl) videoEl.srcObject = null;
      if (sessionUrl) {
        try {
          await fetch(withToken(sessionUrl), { method: 'DELETE' });
        } catch (e) {
          console.warn('[WHEP] Ошибка DELETE сессии:', e);
        }
      }
      if (pc && pc.signalingState !== 'closed') pc.close();
    });
    await Promise.allSettled(tasks);
    activeSessions = [];
  }

  // ── Запустить одну WHEP-сессию ───────────────────────────────────
  async function startStream(videoEl, whepUrl) {
    const pc = new RTCPeerConnection({ iceServers: [] });
    let sessionUrl = null;

    pc.addTransceiver('video', { direction: 'recvonly' });
    pc.addTransceiver('audio', { direction: 'recvonly' });

    pc.ontrack = (evt) => {
      if (evt.track.kind === 'video') {
        videoEl.srcObject = evt.streams[0];
      }
    };

    pc.onconnectionstatechange = () => {
      if (['failed', 'disconnected', 'closed'].includes(pc.connectionState)) {
        console.warn('[WHEP] Соединение потеряно:', whepUrl, pc.connectionState);
      }
    };

    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);

    await new Promise((resolve) => {
      if (pc.iceGatheringState === 'complete') return resolve();
      pc.addEventListener('icegatheringstatechange', function handler() {
        if (pc.iceGatheringState === 'complete') {
          pc.removeEventListener('icegatheringstatechange', handler);
          resolve();
        }
      });
      setTimeout(resolve, 5000);
    });

    const resp = await fetch(withToken(whepUrl), {
      method:  'POST',
      headers: { 'Content-Type': 'application/sdp' },
      body:    pc.localDescription.sdp,
    });

    if (!resp.ok) {
      pc.close();
      throw new Error(`[WHEP] HTTP ${resp.status} — ${whepUrl}`);
    }

    const location = resp.headers.get('location');
    sessionUrl = location
      ? (location.startsWith('http') ? location : new URL(location, whepUrl).href)
      : null;

    const answerSdp = await resp.text();
    await pc.setRemoteDescription({ type: 'answer', sdp: answerSdp });

    activeSessions.push({ pc, sessionUrl, videoEl });
  }

  // ── Загрузить страницу ───────────────────────────────────────────
  async function loadPage(pageIndex) {
    setStatus('Переключение...', 'warning');
    await stopAllSessions();

    const start   = pageIndex * PAGE_SIZE;
    const cameras = ALL_CAMERAS.slice(start, start + PAGE_SIZE);

    slots.forEach((slot, i) => {
      const video   = getSlotVideo(slot);
      const label   = getSlotLabel(slot);
      const spinner = getSlotSpinner(slot);

      video.srcObject = null;

      if (i < cameras.length) {
        slot.style.visibility = 'visible';
        label.textContent     = cameras[i].name || `Камера ${start + i + 1}`;
        spinner.style.display = 'block';
      } else {
        slot.style.visibility = 'hidden';
        label.textContent     = '';
        spinner.style.display = 'none';
      }
    });

    cameras.forEach((cam, i) => {
      const video   = getSlotVideo(slots[i]);
      const spinner = getSlotSpinner(slots[i]);

      startStream(video, cam.whep_url)
        .then(() => { spinner.style.display = 'none'; })
        .catch((err) => {
          spinner.style.display = 'none';
          getSlotLabel(slots[i]).textContent = '⚠ ' + (cam.name || '');
          console.error(`[WHEP] Камера "${cam.name}":`, err);
        });
    });

    pageInfo.textContent = `Страница ${pageIndex + 1} из ${totalPages}`;
    setStatus(`Страница ${pageIndex + 1} / ${totalPages}`, 'success');
    startProgressBar();
  }

  // ── Ротация ──────────────────────────────────────────────────────
  function startRotation() {
    const totalPages = Math.ceil(ALL_CAMERAS.length / PAGE_SIZE);
    if (totalPages === 0) {
      setStatus('Камеры не найдены', 'danger');
      return;
    }
    loadPage(currentPage);
    rotationTimer = setInterval(() => {
      currentPage = (currentPage + 1) % totalPages;
      loadPage(currentPage);
    }, ROTATE_MS);
  }

  // ── Ручная навигация ─────────────────────────────────────────────
  function restartRotation() {
    const totalPages = Math.ceil(ALL_CAMERAS.length / PAGE_SIZE);
    clearInterval(rotationTimer);
    clearInterval(progressTimer);
    loadPage(currentPage);
    rotationTimer = setInterval(() => {
      currentPage = (currentPage + 1) % totalPages;
      loadPage(currentPage);
    }, ROTATE_MS);
  }

  // ── Очистка при уходе со страницы ───────────────────────────────
  window.addEventListener('beforeunload', () => {
    clearInterval(rotationTimer);
    clearInterval(progressTimer);
    activeSessions.forEach(({ pc, videoEl }) => {
      if (videoEl) videoEl.srcObject = null;
      if (pc && pc.signalingState !== 'closed') pc.close();
    });
    activeSessions = [];
  });

  // ── ✅ ВСЕ обращения к DOM — строго внутри DOMContentLoaded ──────
  document.addEventListener('DOMContentLoaded', () => {

    // Инициализация DOM-узлов после полной загрузки страницы
    slots       = document.querySelectorAll('.camera-slot');
    statusBadge = document.getElementById('status-badge');
    pageInfo    = document.getElementById('page-info');
    rotBar      = document.getElementById('rotation-bar');

    document.getElementById('btn-prev').addEventListener('click', () => {
      const totalPages = Math.ceil(ALL_CAMERAS.length / PAGE_SIZE);
      currentPage = (currentPage - 1 + totalPages) % totalPages;
      restartRotation();
    });

    document.getElementById('btn-next').addEventListener('click', () => {
      const totalPages = Math.ceil(ALL_CAMERAS.length / PAGE_SIZE);
      currentPage = (currentPage + 1) % totalPages;
      restartRotation();
    });

    startRotation();
  });

})();

</script>




{% endblock %}
