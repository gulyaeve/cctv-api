server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://zabbix.itmoscow:3100/loki/api/v1/push

scrape_configs:
- job_name: docker-logs
  docker_sd_configs:
  - host: unix:///var/run/docker.sock
    refresh_interval: 10s
    filters:
    # Только контейнеры с определенным именем
    - name: name
      values: ["cctv_backend"]

